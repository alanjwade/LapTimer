<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>Lap Timer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Pre-race setup -->
    <div id="setup-screen" class="screen active">
      <h1 class="app-title">⏱️ Lap Timer</h1>

      <!-- Race type selector -->
      <div class="setup-section">
        <label class="setup-label">Race Type</label>
        <div class="race-type-grid" id="race-type-grid">
          <button class="race-type-btn" data-race="custom">Custom</button>
          <button class="race-type-btn" data-race="800">800m</button>
          <button class="race-type-btn" data-race="1600">1600m</button>
          <button class="race-type-btn" data-race="3200">3200m</button>
          <button class="race-type-btn" data-race="4x400">4×400 Relay</button>
          <button class="race-type-btn" data-race="4x800">4×800 Relay</button>
        </div>
      </div>

      <!-- Custom lap roller (shown for "custom" only) -->
      <div class="setup-section" id="custom-lap-section">
        <label class="setup-label">Number of Laps</label>
        <div class="roller-wrapper">
          <div class="roller-scroll" id="lap-roller"></div>
          <div class="roller-fade roller-fade-top"></div>
          <div class="roller-fade roller-fade-bottom"></div>
          <div class="roller-selector"></div>
        </div>
        <p class="hint">0 = unlimited laps</p>
      </div>

      <!-- Race name -->
      <div class="setup-section">
        <label class="setup-label" for="race-name-input">Race Name</label>
        <input type="text" id="race-name-input" class="setup-input" placeholder="Race" maxlength="40">
      </div>

      <!-- Relay leg names (shown for relays only) -->
      <div class="setup-section" id="relay-legs-section" style="display:none">
        <label class="setup-label">Leg Names</label>
        <div class="relay-legs">
          <input type="text" id="leg1-input" class="setup-input" placeholder="Leg 1" maxlength="30">
          <input type="text" id="leg2-input" class="setup-input" placeholder="Leg 2" maxlength="30">
          <input type="text" id="leg3-input" class="setup-input" placeholder="Leg 3" maxlength="30">
          <input type="text" id="leg4-input" class="setup-input" placeholder="Leg 4" maxlength="30">
        </div>
      </div>

      <button id="start-btn" class="btn-start">START</button>
    </div>

    <!-- Timer running -->
    <div id="timer-screen" class="screen">
      <div class="race-name-display" id="timer-race-name"></div>
      <div class="clock-label">Total time</div>
      <div class="timer-display" id="timer-display">00:00.00</div>
      <div class="clock-label" id="lap-label">Lap time</div>
      <div class="lap-current" id="lap-display">0.00 s</div>

      <div class="laps-to-go" id="laps-to-go"></div>

      <div class="controls">
        <button id="lap-btn" class="btn-action btn-lap">
          <span class="btn-icon">⏱</span>
          <span class="btn-label">Lap</span>
        </button>
        <button id="stop-btn" class="btn-action btn-stop">
          <span class="btn-icon">⏹</span>
          <span class="btn-label">Stop</span>
        </button>
      </div>

      <div class="lap-list" id="lap-list"></div>
    </div>

    <!-- Results -->
    <div id="results-screen" class="screen">
      <h2 class="results-title" id="results-title">Results</h2>
      <div class="timer-display final-time" id="final-time"></div>
      <div class="results-list" id="results-list"></div>

      <div class="results-actions">
        <button id="share-btn" class="btn-share">
          <span class="btn-icon">📤</span>
          <span class="btn-label">Share</span>
        </button>
        <button id="reset-btn" class="btn-reset">
          <span class="btn-icon">↺</span>
          <span class="btn-label">Reset</span>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    }
  </script>
</body>
</html>
